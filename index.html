<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        span {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Student Profile</h2>

        <p><span>Name:</span> Bhupin</p>
        <p><span>Location:</span> Butwal Nayagaun</p>
        <p><span>Level:</span> Bachelor</p>
        <p><span>Training:</span> Digital Marketing</p>
    </div>

</body>
</html>
